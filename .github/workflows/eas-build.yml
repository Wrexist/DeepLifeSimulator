name: EAS Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
 codex/add-more-automation-for-eas-rj0k1x
    strategy:
      matrix:
        platform: [android, ios]
 main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install expo-cli
        run: npm install -g expo-cli@6.3.10

      - name: Expo/EAS login
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run Expo Doctor
        run: npx --yes expo-doctor

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --passWithNoTests

 codex/add-more-automation-for-eas-rj0k1x
      - name: EAS Build iOS
        run: eas build --platform ios --non-interactive

      - name: EAS Build ${{ matrix.platform }}
        run: eas build --platform ${{ matrix.platform }} --non-interactive
 main
