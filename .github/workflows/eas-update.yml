name: EAS Update

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Programmatic auth: https://docs.expo.dev/accounts/programmatic-access/
      # Repo → Settings → Secrets → Actions → EXPO_TOKEN (Expo access token)
      - name: Expo/EAS login
        if: ${{ secrets.EXPO_TOKEN != '' }}
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run Expo Doctor
        run: npx --yes expo-doctor

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --passWithNoTests

      # PR → preview channel (skipped until EXPO_TOKEN is configured)
      - name: EAS Update (preview for PRs)
        if: ${{ github.event_name == 'pull_request' && secrets.EXPO_TOKEN != '' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --channel=preview --message="CI preview update" --non-interactive

      - name: EAS Update skipped (no EXPO_TOKEN)
        if: ${{ github.event_name == 'pull_request' && secrets.EXPO_TOKEN == '' }}
        run: echo "::notice title=EAS Update skipped::Add repository secret EXPO_TOKEN to enable eas update on PRs (https://docs.expo.dev/accounts/programmatic-access/)"

      # main → production channel
      - name: EAS Update (production on main)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.EXPO_TOKEN != '' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --channel=production --message="CI production update" --non-interactive

      - name: EAS Update skipped on main (no EXPO_TOKEN)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.EXPO_TOKEN == '' }}
        run: echo "::notice title=EAS Update skipped::Add repository secret EXPO_TOKEN to publish updates from main"
